problems:
  - status: 400
    code: badRequest
    title: Bad request
    description: The request is malformed or incorrect (invalid OData query, bad payload, or unsupported parameter).
    remediation: Validate the request body and OData query parameters against the operation schema.
  - status: 401
    code: unauthenticated
    title: Unauthorized
    description: Required authentication is missing, malformed, or the access token is expired or invalid.
    remediation: Acquire a valid OAuth 2.0 bearer token from the Microsoft identity platform with the required delegated or application permission.
  - status: 403
    code: forbidden
    title: Forbidden
    description: The authenticated principal lacks the permission/scope required for the resource, or an access policy denies it.
    remediation: Grant the required Graph permission (see scopes/microsoft-exchange-scopes.yml) and obtain admin consent where needed.
  - status: 404
    code: notFound
    title: Not found
    description: The requested resource (message, event, contact, folder, mailbox) does not exist or is not visible to the caller.
    remediation: Verify the resource id and that the mailbox/folder exists and is in scope for the token.

specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft Exchange
providerId: microsoft-exchange
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Email
  - Calendar
  - Exchange Online
  - Microsoft 365
  - Microsoft
description: Microsoft Exchange Online is sold as standalone Plan 1 / Plan 2 SKUs and is also bundled
  into Microsoft 365 Business / Enterprise plans. Pricing is per-user-per-month with annual commitment.
  The Exchange Online APIs (Microsoft Graph mail/calendar, Exchange Web Services, EXO PowerShell, Exchange
  REST) are included with any Exchange-licensed seat at no incremental per-call charge.
sources:
  - https://www.microsoft.com/en-us/microsoft-365/exchange/compare-microsoft-exchange-online-plans
  - https://learn.microsoft.com/en-us/exchange/clients-and-mobile-in-exchange-online/exchange-web-services/exchange-web-services
plans:
  - id: microsoft-exchange-online-plan-1
    name: Exchange Online (Plan 1)
    type: subscription
    description: Cloud-hosted business email with a 50 GB primary mailbox and 50 GB archive. $4.00/user/month,
      paid yearly.
    entries:
      - label: Per user, paid yearly
        name: exchange_plan_1
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '4.00'
        userMultiplied: true
      - label: Primary mailbox storage
        name: mailbox_primary
        type: quota
        metric: gb
        limit: 50
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: true
      - label: Archive mailbox
        name: mailbox_archive
        type: quota
        metric: gb
        limit: 50
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: 50 GB mailbox
      - name: Custom email domain
      - name: Calendar
      - name: Anti-malware / anti-spam (EOP)
      - name: Outlook web / mobile / desktop
  - id: microsoft-exchange-online-plan-2
    name: Exchange Online (Plan 2)
    type: subscription
    description: 100 GB primary mailbox plus unlimited archive (1.5 TB), DLP, hosted voicemail. $8.00/user/month,
      paid yearly.
    entries:
      - label: Per user, paid yearly
        name: exchange_plan_2
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '8.00'
        userMultiplied: true
      - label: Primary mailbox storage
        name: mailbox_primary
        type: quota
        metric: gb
        limit: 100
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: true
      - label: Archive mailbox (auto-expanding)
        name: mailbox_archive
        type: quota
        metric: gb
        limit: 1500
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: 100 GB mailbox
      - name: 1.5 TB auto-expanding archive
      - name: Data Loss Prevention
      - name: Hosted voicemail
      - name: In-place hold / eDiscovery
  - id: microsoft-exchange-via-m365-business
    name: Exchange Online via Microsoft 365 Business
    type: subscription
    description: Exchange Online Plan 1 is bundled in Microsoft 365 Business Basic / Standard / Premium.
    entries:
      - label: Microsoft 365 Business Basic (per user, yearly)
        name: m365_business_basic
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '6.00'
        userMultiplied: true
      - label: Microsoft 365 Business Standard (per user, yearly)
        name: m365_business_standard
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '12.50'
        userMultiplied: true
    elements:
      - name: Bundled Exchange Online Plan 1
      - name: Outlook desktop (Standard tier)
      - name: 1 TB OneDrive
  - id: microsoft-exchange-via-m365-enterprise
    name: Exchange Online via Microsoft 365 Enterprise
    type: subscription
    description: Exchange Online Plan 2 is bundled in Microsoft 365 E3 and E5.
    entries:
      - label: Microsoft 365 E3 (per user, yearly)
        name: m365_e3
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '36.00'
        userMultiplied: true
      - label: Microsoft 365 E5 (per user, yearly)
        name: m365_e5
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '57.00'
        userMultiplied: true
    elements:
      - name: Bundled Exchange Online Plan 2
      - name: Defender for Office 365 (E5)
      - name: Advanced eDiscovery

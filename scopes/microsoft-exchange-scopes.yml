docs_note: >-
  Microsoft Graph permissions come in delegated and application variants (e.g.
  Mail.Read has both). Application permissions require admin consent; some read
  scopes (Mail.ReadBasic, MailboxFolder.Read) and the .Shared variants are
  documented in the Graph permissions reference. The .default scope is used
  with the client-credentials flow to request all statically-consented app
  permissions.

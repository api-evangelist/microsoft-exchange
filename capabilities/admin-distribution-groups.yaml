      type: bearer
      token: '{{env.MICROSOFT_EXCHANGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-distribution-groups-rest
    port: 8080
    description: REST adapter for Microsoft Exchange Exchange Online Admin API — Distribution Groups. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/distributiongroupmember
      name: distributiongroupmember
      description: REST surface for DistributionGroupMember.
      operations:
      - method: POST
        name: getdistributiongroupmembers
        description: Microsoft Exchange Get distribution group members
        call: admin-distribution-groups.getdistributiongroupmembers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dynamicdistributiongroupmember
      name: dynamicdistributiongroupmember
      description: REST surface for DynamicDistributionGroupMember.
      operations:
      - method: POST
        name: getdynamicdistributiongroupmembers
        description: Microsoft Exchange Get dynamic distribution group members
        call: admin-distribution-groups.getdynamicdistributiongroupmembers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.

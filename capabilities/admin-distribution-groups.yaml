    namespace: admin-distribution-groups
    baseUri: https://outlook.office365.com/adminapi/v2.0
    description: Microsoft Exchange Exchange Online Admin API — Distribution Groups business capability. Self-contained, no
      shared references.
    resources:
    - name: DistributionGroupMember
      path: /DistributionGroupMember
      operations:
      - name: getdistributiongroupmembers
        method: POST
        description: Microsoft Exchange Get distribution group members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: DynamicDistributionGroupMember
      path: /DynamicDistributionGroupMember
      operations:
      - name: getdynamicdistributiongroupmembers
        method: POST
        description: Microsoft Exchange Get dynamic distribution group members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true

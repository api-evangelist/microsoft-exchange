naftiko: 1.0.0-alpha2
info:
  label: Microsoft Exchange Exchange Online Admin API — Distribution Groups
  description: 'Microsoft Exchange Exchange Online Admin API — Distribution Groups. 2 operations. Lead operation: Microsoft
    Exchange Get distribution group members. Self-contained Naftiko capability covering one Microsoft Exchange business surface.'
  tags:
  - Microsoft Exchange
  - Distribution Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env

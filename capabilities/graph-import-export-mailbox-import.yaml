naftiko: 1.0.0-alpha2
info:
  label: Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Import
  description: 'Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Import. 1 operations. Lead operation:
    Microsoft Exchange Import item into folder. Self-contained Naftiko capability covering one Microsoft Exchange business
    surface.'
  tags:
  - Microsoft Exchange
  - Mailbox Import
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_EXCHANGE_API_KEY: MICROSOFT_EXCHANGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: graph-import-export-mailbox-import
    baseUri: https://graph.microsoft.com/beta
    description: Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Import business capability. Self-contained,
      no shared references.
    resources:
    - name: users-user-id-mailboxes-mailbox-id-folders-folder-id-items-import
      path: /users/{user-id}/mailboxes/{mailbox-id}/folders/{folder-id}/items/import
      operations:
      - name: importmailboxitem
        method: POST
        description: Microsoft Exchange Import item into folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_EXCHANGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: graph-import-export-mailbox-import-rest
    port: 8080
    description: REST adapter for Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Import. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/users/{user-id}/mailboxes/{mailbox-id}/folders/{folder-id}/items/import
      name: users-user-id-mailboxes-mailbox-id-folders-folder-id-items-import
      description: REST surface for users-user-id-mailboxes-mailbox-id-folders-folder-id-items-import.
      operations:
      - method: POST
        name: importmailboxitem
        description: Microsoft Exchange Import item into folder
        call: graph-import-export-mailbox-import.importmailboxitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: graph-import-export-mailbox-import-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Import. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: microsoft-exchange-import-item-folder
      description: Microsoft Exchange Import item into folder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: graph-import-export-mailbox-import.importmailboxitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Export
  description: 'Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Export. 2 operations. Lead operation:
    Microsoft Exchange List folder items. Self-contained Naftiko capability covering one Microsoft Exchange business surface.'
  tags:
  - Microsoft Exchange
  - Mailbox Export
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_EXCHANGE_API_KEY: MICROSOFT_EXCHANGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: graph-import-export-mailbox-export
    baseUri: https://graph.microsoft.com/beta
    description: Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Export business capability. Self-contained,
      no shared references.
    resources:
    - name: users-user-id-mailboxes-mailbox-id-folders-folder-id-items
      path: /users/{user-id}/mailboxes/{mailbox-id}/folders/{folder-id}/items
      operations:
      - name: listmailboxfolderitems
        method: GET
        description: Microsoft Exchange List folder items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-user-id-mailboxes-mailbox-id-folders-folder-id-items-item-id-content
      path: /users/{user-id}/mailboxes/{mailbox-id}/folders/{folder-id}/items/{item-id}/content
      operations:
      - name: exportmailboxitemcontent
        method: GET
        description: Microsoft Exchange Export item content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_EXCHANGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: graph-import-export-mailbox-export-rest
    port: 8080
    description: REST adapter for Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Export. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/users/{user-id}/mailboxes/{mailbox-id}/folders/{folder-id}/items
      name: users-user-id-mailboxes-mailbox-id-folders-folder-id-items
      description: REST surface for users-user-id-mailboxes-mailbox-id-folders-folder-id-items.
      operations:
      - method: GET
        name: listmailboxfolderitems
        description: Microsoft Exchange List folder items
        call: graph-import-export-mailbox-export.listmailboxfolderitems
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{user-id}/mailboxes/{mailbox-id}/folders/{folder-id}/items/{item-id}/content
      name: users-user-id-mailboxes-mailbox-id-folders-folder-id-items-item-id-content
      description: REST surface for users-user-id-mailboxes-mailbox-id-folders-folder-id-items-item-id-content.
      operations:
      - method: GET
        name: exportmailboxitemcontent
        description: Microsoft Exchange Export item content
        call: graph-import-export-mailbox-export.exportmailboxitemcontent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: graph-import-export-mailbox-export-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Exchange Microsoft Graph Mailbox Import Export API — Mailbox Export. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: microsoft-exchange-list-folder-items
      description: Microsoft Exchange List folder items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-import-export-mailbox-export.listmailboxfolderitems
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-exchange-export-item-content
      description: Microsoft Exchange Export item content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-import-export-mailbox-export.exportmailboxitemcontent
      outputParameters:
      - type: object
        mapping: $.

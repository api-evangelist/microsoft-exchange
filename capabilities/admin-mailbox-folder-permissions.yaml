naftiko: 1.0.0-alpha2
info:
  label: Microsoft Exchange Exchange Online Admin API — Mailbox Folder Permissions
  description: 'Microsoft Exchange Exchange Online Admin API — Mailbox Folder Permissions. 1 operations. Lead operation: Microsoft
    Exchange Manage mailbox folder permissions. Self-contained Naftiko capability covering one Microsoft Exchange business
    surface.'
  tags:
  - Microsoft Exchange
  - Mailbox Folder Permissions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_EXCHANGE_API_KEY: MICROSOFT_EXCHANGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-mailbox-folder-permissions
    baseUri: https://outlook.office365.com/adminapi/v2.0
    description: Microsoft Exchange Exchange Online Admin API — Mailbox Folder Permissions business capability. Self-contained,
      no shared references.
    resources:
    - name: MailboxFolderPermission
      path: /MailboxFolderPermission
      operations:
      - name: managemailboxfolderpermission
        method: POST
        description: Microsoft Exchange Manage mailbox folder permissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_EXCHANGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-mailbox-folder-permissions-rest
    port: 8080
    description: REST adapter for Microsoft Exchange Exchange Online Admin API — Mailbox Folder Permissions. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/mailboxfolderpermission
      name: mailboxfolderpermission
      description: REST surface for MailboxFolderPermission.
      operations:
      - method: POST
        name: managemailboxfolderpermission
        description: Microsoft Exchange Manage mailbox folder permissions
        call: admin-mailbox-folder-permissions.managemailboxfolderpermission
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-mailbox-folder-permissions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Exchange Exchange Online Admin API — Mailbox Folder Permissions. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: microsoft-exchange-manage-mailbox-folder
      description: Microsoft Exchange Manage mailbox folder permissions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-mailbox-folder-permissions.managemailboxfolderpermission
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
